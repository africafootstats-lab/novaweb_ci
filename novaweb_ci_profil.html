<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novaweb CI — Photo de profil</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; padding: 32px 16px; font-family: 'Segoe UI', Arial, sans-serif; }

.hint { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 2px; }

/* Aperçu réseaux */
.previews { display: flex; gap: 28px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
.preview-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.preview-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1.5px; }

/* Cercle (Instagram, TikTok, WhatsApp) */
.circle-frame { border-radius: 50%; overflow: hidden; border: 2px solid #1a1a1a; }
/* Carré arrondi (Facebook) */
.square-frame { border-radius: 16px; overflow: hidden; border: 2px solid #1a1a1a; }

.download-box { background: #1a1a1a; border: 1px solid #222; border-radius: 14px; padding: 20px 28px; text-align: center; }
.download-box p { font-size: 12px; color: #555; margin-bottom: 10px; }
.download-box code { font-size: 11px; color: #00a86b; background: #0d2a1e; padding: 4px 10px; border-radius: 6px; }
</style>
</head>
<body>

<p class="hint">Photo de profil — Novaweb CI</p>

<!-- IMAGE PRINCIPALE 400x400 -->
<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" id="main-logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#002a1e"/>
      <stop offset="50%" stop-color="#004a34"/>
      <stop offset="100%" stop-color="#006644"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7affdd" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ff99" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="globe" x1="100" y1="100" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7affdd"/>
      <stop offset="100%" stop-color="#a8ffcc"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Cercle lumineux derrière le globe (halo) -->
  <circle cx="200" cy="190" r="130" fill="url(#glow)" filter="url(#soft)"/>

  <!-- Hexagone extérieur décoratif -->
  <polygon
    points="200,52 318,116 318,244 200,308 82,244 82,116"
    fill="none"
    stroke="rgba(255,255,255,0.08)"
    stroke-width="1.5"
  />

  <!-- Hexagone intérieur -->
  <polygon
    points="200,72 302,128 302,240 200,296 98,240 98,128"
    fill="rgba(255,255,255,0.04)"
    stroke="rgba(255,255,255,0.14)"
    stroke-width="1.2"
  />

  <!-- Globe principal -->
  <!-- Cercle extérieur -->
  <circle cx="200" cy="184" r="88" fill="none" stroke="url(#globe)" stroke-width="2.5"/>

  <!-- Méridien vertical (ellipse) -->
  <ellipse cx="200" cy="184" rx="40" ry="88" fill="none" stroke="url(#globe)" stroke-width="1.6" stroke-dasharray="0"/>

  <!-- Ligne équateur -->
  <line x1="112" y1="184" x2="288" y2="184" stroke="url(#globe)" stroke-width="1.6"/>

  <!-- Latitude haut -->
  <path d="M 128 148 Q 200 138 272 148" fill="none" stroke="url(#globe)" stroke-width="1.2" stroke-opacity="0.7"/>

  <!-- Latitude bas -->
  <path d="M 128 220 Q 200 230 272 220" fill="none" stroke="url(#globe)" stroke-width="1.2" stroke-opacity="0.7"/>

  <!-- Méridien diagonaux légers -->
  <ellipse cx="200" cy="184" rx="72" ry="88" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>

  <!-- Point lumineux pôle nord -->
  <circle cx="200" cy="96" r="4" fill="#7affdd" opacity="0.9"/>
  <circle cx="200" cy="96" r="8" fill="#7affdd" opacity="0.2"/>

  <!-- Texte NOVA -->
  <text
    x="200" y="332"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="52"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-1"
  >NOVA</text>

  <!-- Ligne décorative sous NOVA -->
  <line x1="120" y1="344" x2="280" y2="344" stroke="rgba(122,255,221,0.3)" stroke-width="1"/>

  <!-- web CI -->
  <text
    x="172" y="372"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="22"
    font-weight="300"
    fill="rgba(255,255,255,0.55)"
    letter-spacing="0"
  >web</text>

  <rect x="228" y="354" width="44" height="24" rx="6" fill="rgba(122,255,221,0.12)"/>
  <rect x="228" y="354" width="44" height="24" rx="6" fill="none" stroke="rgba(122,255,221,0.4)" stroke-width="1.2"/>
  <text
    x="250" y="371"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="13"
    font-weight="800"
    fill="#7affdd"
    text-anchor="middle"
    letter-spacing="1"
  >CI</text>

  <!-- Petits points décoratifs coins -->
  <circle cx="60" cy="60" r="2.5" fill="rgba(122,255,221,0.25)"/>
  <circle cx="340" cy="60" r="2.5" fill="rgba(122,255,221,0.25)"/>
  <circle cx="60" cy="340" r="2.5" fill="rgba(122,255,221,0.15)"/>
  <circle cx="340" cy="340" r="2.5" fill="rgba(122,255,221,0.15)"/>
</svg>

<!-- APERÇUS PAR RÉSEAU -->
<div class="previews">

  <div class="preview-wrap">
    <p class="preview-label">Instagram</p>
    <div class="circle-frame" style="width:80px;height:80px;">
      <svg width="80" height="80" viewBox="0 0 400 400"><use href="#main-logo"/><defs><linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#002a1e"/><stop offset="50%" stop-color="#004a34"/><stop offset="100%" stop-color="#006644"/></linearGradient><linearGradient id="glow" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#7affdd" stop-opacity="0.18"/><stop offset="100%" stop-color="#00ff99" stop-opacity="0.05"/></linearGradient><linearGradient id="globe" x1="100" y1="100" x2="300" y2="300" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#7affdd"/><stop offset="100%" stop-color="#a8ffcc"/></linearGradient><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3"/></filter></defs><rect width="400" height="400" fill="url(#bg)"/><circle cx="200" cy="190" r="130" fill="url(#glow)" filter="url(#soft)"/><polygon points="200,52 318,116 318,244 200,308 82,244 82,116" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/><polygon points="200,72 302,128 302,240 200,296 98,240 98,128" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" stroke-width="1.2"/><circle cx="200" cy="184" r="88" fill="none" stroke="url(#globe)" stroke-width="2.5"/><ellipse cx="200" cy="184" rx="40" ry="88" fill="none" stroke="url(#globe)" stroke-width="1.6"/><line x1="112" y1="184" x2="288" y2="184" stroke="url(#globe)" stroke-width="1.6"/><path d="M 128 148 Q 200 138 272 148" fill="none" stroke="url(#globe)" stroke-width="1.2" stroke-opacity="0.7"/><path d="M 128 220 Q 200 230 272 220" fill="none" stroke="url(#globe)" stroke-width="1.2" stroke-opacity="0.7"/><circle cx="200" cy="96" r="4" fill="#7affdd" opacity="0.9"/><circle cx="200" cy="96" r="8" fill="#7affdd" opacity="0.2"/><text x="200" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-1">NOVA</text><line x1="120" y1="344" x2="280" y2="344" stroke="rgba(122,255,221,0.3)" stroke-width="1"/><text x="172" y="372" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="300" fill="rgba(255,255,255,0.55)">web</text><rect x="228" y="354" width="44" height="24" rx="6" fill="rgba(122,255,221,0.12)"/><rect x="228" y="354" width="44" height="24" rx="6" fill="none" stroke="rgba(122,255,221,0.4)" stroke-width="1.2"/><text x="250" y="371" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="800" fill="#7affdd" text-anchor="middle" letter-spacing="1">CI</text></svg>
    </div>
  </div>

  <div class="preview-wrap">
    <p class="preview-label">TikTok</p>
    <div class="circle-frame" style="width:64px;height:64px;">
      <svg width="64" height="64" viewBox="0 0 400 400"><rect width="400" height="400" fill="#003d2b"/><circle cx="200" cy="184" r="88" fill="none" stroke="#7affdd" stroke-width="2.5"/><ellipse cx="200" cy="184" rx="40" ry="88" fill="none" stroke="#7affdd" stroke-width="1.6"/><line x1="112" y1="184" x2="288" y2="184" stroke="#7affdd" stroke-width="1.6"/><path d="M 128 148 Q 200 138 272 148" fill="none" stroke="#7affdd" stroke-width="1.2" stroke-opacity="0.7"/><path d="M 128 220 Q 200 230 272 220" fill="none" stroke="#7affdd" stroke-width="1.2" stroke-opacity="0.7"/><text x="200" y="332" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#fff" text-anchor="middle">NOVA</text><text x="172" y="372" font-family="Arial, sans-serif" font-size="22" font-weight="300" fill="rgba(255,255,255,0.55)">web</text><text x="250" y="371" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#7affdd" text-anchor="middle">CI</text></svg>
    </div>
  </div>

  <div class="preview-wrap">
    <p class="preview-label">WhatsApp</p>
    <div class="circle-frame" style="width:56px;height:56px;">
      <svg width="56" height="56" viewBox="0 0 400 400"><rect width="400" height="400" fill="#003d2b"/><circle cx="200" cy="184" r="88" fill="none" stroke="#7affdd" stroke-width="2.5"/><ellipse cx="200" cy="184" rx="40" ry="88" fill="none" stroke="#7affdd" stroke-width="1.6"/><line x1="112" y1="184" x2="288" y2="184" stroke="#7affdd" stroke-width="1.6"/><path d="M 128 148 Q 200 138 272 148" fill="none" stroke="#7affdd" stroke-width="1.2" stroke-opacity="0.7"/><path d="M 128 220 Q 200 230 272 220" fill="none" stroke="#7affdd" stroke-width="1.2" stroke-opacity="0.7"/><text x="200" y="332" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#fff" text-anchor="middle">NOVA</text><text x="172" y="372" font-family="Arial, sans-serif" font-size="22" font-weight="300" fill="rgba(255,255,255,0.55)">web</text><text x="250" y="371" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#7affdd" text-anchor="middle">CI</text></svg>
    </div>
  </div>

  <div class="preview-wrap">
    <p class="preview-label">Facebook</p>
    <div class="square-frame" style="width:72px;height:72px;">
      <svg width="72" height="72" viewBox="0 0 400 400"><rect width="400" height="400" fill="#003d2b"/><circle cx="200" cy="184" r="88" fill="none" stroke="#7affdd" stroke-width="2.5"/><ellipse cx="200" cy="184" rx="40" ry="88" fill="none" stroke="#7affdd" stroke-width="1.6"/><line x1="112" y1="184" x2="288" y2="184" stroke="#7affdd" stroke-width="1.6"/><path d="M 128 148 Q 200 138 272 148" fill="none" stroke="#7affdd" stroke-width="1.2" stroke-opacity="0.7"/><path d="M 128 220 Q 200 230 272 220" fill="none" stroke="#7affdd" stroke-width="1.2" stroke-opacity="0.7"/><text x="200" y="332" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#fff" text-anchor="middle">NOVA</text><text x="172" y="372" font-family="Arial, sans-serif" font-size="22" font-weight="300" fill="rgba(255,255,255,0.55)">web</text><text x="250" y="371" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#7affdd" text-anchor="middle">CI</text></svg>
    </div>
  </div>

</div>

<!-- INSTRUCTIONS -->
<div class="download-box">
  <p>Pour enregistrer : appuie longtemps sur le logo → "Enregistrer l'image"<br>Ou fais clic droit sur ordinateur → "Enregistrer l'image sous"</p>
  <code>Taille recommandée : 400×400 px minimum</code>
</div>

</body>
</html>
